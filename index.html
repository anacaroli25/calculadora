   
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Calculadora</title>
  <link rel="stylesheet" href="style.css">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">


</head>
<body>

  <div class="container mt-5">
    <div class="card shadow p-4 calculadora">
      <h3 class="text-center mb-4">Calculadora</h3>

      <input type="number" id="valor1" class="form-control mb-3" placeholder="Primeiro valor">
      <input type="number" id="valor2" class="form-control mb-3" placeholder="Segundo valor">

      <div class="d-flex justify-content-between mb-3">
        <button class="btn btn-primary" onclick="calcular('+')">+</button>
        <button class="btn btn-primary" onclick="calcular('-')">-</button>
        <button class="btn btn-primary" onclick="calcular('*')">×</button>
        <button class="btn btn-primary" onclick="calcular('/')">÷</button>
        
      </div>

      <div id="resultado" class="alert alert-info text-center">
        Resultado: -
      </div>
    </div>
  </div>

 
  <script src="codigo.js"></script>

</body>
</html>
